# GIFT Multimodal EAE — runtime environment (WINDOWS / win-64).
#
# Same as environment.yml, but the PyTorch trio AND Pillow come from pip:
#   * conda-forge has no win-64 torchaudio, so the whole trio is installed from
#     pip together (keeps the wheels mutually ABI-matched).
#   * pip Pillow resolves its own DLLs without relying on %PATH%/System32, so it
#     survives a contaminated system PATH where conda-forge Pillow throws
#     ``_imaging`` WinError 193.
# mac/linux use environment.yml (full conda-forge trio). Windows:
#
#   conda env create -f environment.windows.yml

name: gift-meae

channels:
  - conda-forge
  - defaults

dependencies:
  # ----- Core Python --------------------------------------------------------
  - python=3.11
  - git
  - pip
  # libs/Track imports pkg_resources, dropped by setuptools 75+.
  - setuptools<75

  # ----- Numerical / data ---------------------------------------------------
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - scikit-image
  - matplotlib
  - tqdm
  - shapely
  - loguru
  # Pillow comes from pip (see pip section); conda pulls one transitively here.

  # ----- Vision / video -----------------------------------------------------
  - opencv
  - ffmpeg
  - pkg-config
  # conda-forge av links against the env's ffmpeg (PyPI's av bundles its own).
  - conda-forge::av

  # ----- GUI (Config Builder + Mapper tools) --------------------------------
  - pyqt=5

  # ----- Analysis viewer (Tauri shell) --------------------------------------
  # Rust toolchain (Tauri 2 needs rustc >= 1.77) kept inside the env.
  - conda-forge::rust

  - pip:
      # ----- Deep-learning runtime -------------------------------------------
      # Torch trio from pip (no conda-forge win-64 torchaudio). PyPI's default
      # Windows wheels are CUDA builds; see the README "CUDA users" section to
      # pick a specific cu### / CPU build. Pinned to match whisperx 3.7.4 +
      # pyannote.audio 3.4.0 (pyannote requires torch==2.8.0).
      - torch==2.8.0
      - torchvision==0.23.0
      - torchaudio==2.8.0

      # Pillow from pip — robust against a broken system PATH (see header).
      - pillow

      # ----- Misc utilities -------------------------------------------------
      - platformdirs
      - imutils
      - filterpy
      - dtw
      - lap
      - gdown
      - ftfy
      - regex
      - cython

      # Modern omegaconf — denoiser's hydra-core can pull legacy 1.4 which
      # breaks pyannote.audio's pickled VAD load.
      - omegaconf>=2.3

      # Needed by torch>=2.5's dynamo torch.onnx.export (onnx_export.py).
      - onnxscript

      # WAV I/O for src/utils/denoise.py (avoids torchaudio>=2.8 torchcodec).
      - soundfile

      # ----- Audio / transcription -----------------------------------------
      # whisperx + pyannote.audio pinned with torch=2.8.x; pyannote 4.0+ would
      # hard-pin torch and whisperx excludes it, so 3.x is the stable target.
      - whisperx==3.7.4
      - pyannote.audio==3.4.0

      # ----- giftpose runtime: optional accelerated backends ---------------
      # ONNX Runtime: large CPU speedup; use onnxruntime-gpu for CUDA.
      - onnx>=1.17
      - onnxruntime>=1.20
      # TRT backend (NVIDIA, Turing+ / SM >= 7.5): swap onnxruntime for
      # onnxruntime-gpu and uncomment below. TensorRT 10.12+ also needs
      # onnxconverter-common for the strong-typed fp16 path.
      # - tensorrt
      # - onnxconverter-common

      # FB Denoiser (omegaconf>=2.3 above mitigates its hydra-core transitive).
      - denoiser

      # ----- Analysis viewer (Tauri sidecar) --------------------------------
      # FastAPI sidecar for the Tauri/Vue frontend.
      - fastapi
      - uvicorn[standard]
      - aiofiles
