# GIFT Multimodal EAE — runtime environment (WINDOWS / win-64).
#
# On Windows the whole Python stack comes from pip; conda provides only the
# pieces pip can't (the interpreter, git, the ffmpeg CLI, and the Rust/Tauri
# toolchain). One source for every Python package avoids the conda/pip native
# DLL clashes on Windows — pip's torchvision wheel ships bare-named image DLLs
# (jpeg8/zlib/libpng16) that hijack a conda Pillow/OpenCV which link the same
# names, breaking _imaging / cv2. pip Pillow + pip OpenCV carry their own libs,
# so nothing collides. (mac/linux don't hit this: their pip wheels hash-rename
# vendored libs, and they use the conda-forge stack in environment.yml anyway.)
#
# Two files because conda-forge has no win-64 torchaudio and conda env files
# have no per-OS selectors. Windows:
#
#   conda env create --file environment.windows.yml

name: gift-meae

channels:
  - conda-forge
  - defaults

dependencies:
  # ----- conda: only what pip can't provide ---------------------------------
  - python=3.11
  - pip
  - git
  - ffmpeg                # CLI binary whisperx shells out to (no pip equivalent)
  - conda-forge::rust     # Tauri 2 toolchain, rustc >= 1.77 (no pip equivalent)

  - pip:
      # libs/Track imports pkg_resources, dropped by setuptools 75+.
      - setuptools<75

      # CA bundle for HTTPS downloads (see src/utils/certs.py); transitive, but
      # pinned so the cert-store workaround is guaranteed.
      - certifi

      # ----- Numerical / data -----------------------------------------------
      - numpy
      - scipy
      - pandas
      - scikit-learn
      - scikit-image
      - matplotlib
      - tqdm
      - shapely
      - loguru
      - pillow

      # ----- Vision / video -------------------------------------------------
      - opencv-python
      - av

      # ----- GUI (Config Builder + Mapper tools) ----------------------------
      - PyQt5

      # ----- Deep-learning runtime ------------------------------------------
      # PyPI's default Windows wheels are CPU; see the README "CUDA users"
      # section to install matching cu### wheels. Pinned to match whisperx
      # 3.7.4 + pyannote.audio 3.4.0 (pyannote requires torch==2.8.0).
      - torch==2.8.0
      - torchvision==0.23.0
      - torchaudio==2.8.0

      # ----- Misc utilities -------------------------------------------------
      - platformdirs
      - imutils
      - filterpy
      - dtw
      - lap
      - gdown
      - ftfy
      - regex
      - cython

      # Modern omegaconf — denoiser's hydra-core can pull legacy 1.4 which
      # breaks pyannote.audio's pickled VAD load.
      - omegaconf>=2.3

      # Needed by torch>=2.5's dynamo torch.onnx.export (onnx_export.py).
      - onnxscript

      # WAV I/O for src/utils/denoise.py (avoids torchaudio>=2.8 torchcodec).
      - soundfile

      # ----- Audio / transcription -----------------------------------------
      - whisperx==3.7.4
      - pyannote.audio==3.4.0

      # ----- giftpose runtime: optional accelerated backends ---------------
      - onnx>=1.17
      - onnxruntime>=1.20
      # TRT backend (NVIDIA, Turing+ / SM >= 7.5): swap onnxruntime for
      # onnxruntime-gpu; TensorRT 10.12+ also needs onnxconverter-common.
      # - tensorrt
      # - onnxconverter-common

      - denoiser

      # ----- Analysis viewer (Tauri sidecar) --------------------------------
      - fastapi
      - uvicorn[standard]
      - aiofiles
